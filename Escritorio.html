<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3d7ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escritorio">
<title>Mi Escritorio — Aero</title>

<!-- Preconnect a los dos orígenes que sí usamos en carga inicial. Con esto el
     navegador hace DNS+TLS en paralelo al HTML y no esperamos al final del
     parse para abrir la conexión. Ahorra ~100-200 ms de LCP. -->
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>

<link rel="stylesheet" href="aero.css">

<!-- React 18.3.1 EN PRODUCCIÓN: .production.min.js es ~8× más pequeño que
     .development.js, no incluye warnings/invariants, y ejecuta 2-3× más rápido
     en runtime. Usar .development en producción era uno de los principales
     motivos del 50% en Lighthouse. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>

<!-- IMPORTANTE: ya NO cargamos @babel/standalone (eran 639 KiB + 1.1s de
     compilación en main thread por carga). El JSX se pre-compila con esbuild
     en ./build.sh antes del deploy y se sirve como dist/app.<hash>.js. -->

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Tweak defaults -->
<script id="tweak-defaults" type="application/json">
{
  "wallpaper": "bliss",
  "font": "segoe",
  "dark": false,
  "blur": 18,
  "particles": true
}
</script>

<!-- firebase-config.js va PRIMERO: instala el hook de Storage.prototype antes
     que cualquier otro script cachee referencias al localStorage.setItem
     nativo. Sin esto, en WebKit iOS el hook podría no capturar writes. -->
<script src="firebase-config.js"></script>

<!-- Bundle con todos los componentes JSX pre-compilados + minificados.
     El hash en el nombre hace el cache inmutable (firebase.json tiene
     max-age=31536000 para dist/**). Al tocar código, ./build.sh regenera el
     hash y reescribe esta línea automáticamente. -->
<script src="dist/app.6e8153c938.js"></script>
</body>
</html>
