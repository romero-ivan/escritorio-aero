<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3d7ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escritorio">
<title>Mi Escritorio — Aero</title>
<link rel="stylesheet" href="aero.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Tweak defaults -->
<script id="tweak-defaults" type="application/json">
{
  "wallpaper": "bliss",
  "font": "segoe",
  "dark": false,
  "blur": 18,
  "particles": true
}
</script>

<!-- firebase-config.js va PRIMERO: instala el hook de Storage.prototype antes
     que cualquier otro script cachee referencias al localStorage.setItem
     nativo. Sin esto, en WebKit iOS el hook podría no capturar writes. -->
<script src="firebase-config.js"></script>

<!-- Wallpaper layer (SVG backgrounds) -->
<script type="text/babel" src="components/Wallpaper.jsx"></script>
<script type="text/babel" src="components/Particles.jsx"></script>
<script type="text/babel" src="components/Window.jsx"></script>
<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/Gadgets.jsx"></script>
<script type="text/babel" src="components/Apps.jsx"></script>
<script type="text/babel" src="components/Apps2.jsx"></script>
<script type="text/babel" src="components/Taskbar.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>
<script type="text/babel" src="components/App.jsx"></script>
</body>
</html>
